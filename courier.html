<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>La Forno — Curier</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body,#root{width:100%;height:100%;}
  body{font-family:'Inter',sans-serif;background:#f5f5f0;-webkit-font-smoothing:antialiased;overflow:hidden;}
  @keyframes slide-up{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  .card-new{animation:slide-up 0.3s ease-out}
  @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.3}}
  .pulse{animation:pulse-dot 2s ease-in-out infinite}
  @keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  .bounce-in{animation:bounce 0.5s ease-out}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">

const { createClient } = supabase;
const db = createClient(
  'https://qzjotkbqbxhmrngqxhpo.supabase.co',
  'sb_publishable_SjMLlBtIqu-ilkr75Uwcqg_dDKhcYAD'
);

const Icon = ({ name, size = 20, className = "" }) => {
  const icons = {
    mapPin: <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></>,
    phone: <path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.7.6 2.5a2 2 0 0 1-.5 2.1L8 9.6a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.5c.8.3 1.6.5 2.5.6a2 2 0 0 1 1.7 2z"/>,
    check: <polyline points="20 6 9 17 4 12"/>,
    truck: <><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></>,
    clock: <><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></>,
    refresh: <><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
      strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
      {icons[name] || icons.check}
    </svg>
  );
};

function App() {
  const [orders, setOrders] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [updating, setUpdating] = React.useState(null);
  const [notification, setNotification] = React.useState('');

  const fetchOrders = React.useCallback(async () => {
    const { data, error } = await db.from('orders')
      .select('*')
      .in('status', ['în preparare', 'gata de livrare', 'în livrare'])
      .order('created_at', { ascending: false });

    console.log('Curier fetch:', { data, error });
    if (!error && data) {
      setOrders(data || []);
      const newGata = data.filter(o => o.status === 'gata de livrare').length;
      if (newGata > 0) playNotification();
    } else if (error) {
      console.error('Eroare Supabase:', error.message);
    }
    console.log('Curier fetch:', { data, error });
    setLoading(false);
  }, []);

  React.useEffect(() => {
    fetchOrders();
    const channel = db.channel('courier-orders')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, fetchOrders)
      .subscribe();
    return () => db.removeChannel(channel);
  }, [fetchOrders]);

  const playNotification = () => {
    const audio = new Audio('data:audio/wav;base64,UklGRiYAAABXQVZFZm10IBAAAAABAAEAQB8AAAB9AAACABAAZGF0YQIAAAAAAA==');
    audio.play().catch(() => {});
    setNotification('Comandă nouă gata de livrare! 📦');
    setTimeout(() => setNotification(''), 4000);
  };

  const updateStatus = async (id, newStatus) => {
    setUpdating(id);
    await db.from('orders').update({ status: newStatus }).eq('id', id);
    setOrders(prev => prev.map(o => o.id === id ? { ...o, status: newStatus } : o).filter(o => ['gata de livrare', 'în livrare'].includes(o.status)));
    setUpdating(null);
  };

  const inPreparare = orders.filter(o => o.status === 'în preparare');
  const gataDeLopit = orders.filter(o => o.status === 'gata de livrare');
  const inLivrare = orders.filter(o => o.status === 'în livrare');
  const mapsUrl = (addr) => `https://maps.google.com/?q=${encodeURIComponent(addr)}`;

  if (loading) return (
    <div className="w-full h-full flex items-center justify-center bg-gradient-to-br from-red-50 to-orange-50">
      <div className="text-center">
        <div className="w-14 h-14 mx-auto rounded-full border-4 border-red-200 border-t-red-600 animate-spin mb-4"/>
        <p className="text-gray-600 font-medium">Se încarcă comenzile...</p>
      </div>
    </div>
  );

  return (
    <div className="w-full h-full flex flex-col bg-gradient-to-br from-red-50 to-orange-50 safe-area-inset-bottom">
      {notification && (
        <div className="fixed top-0 left-0 right-0 z-50 px-4 pt-4 pointer-events-none">
          <div className="bounce-in bg-green-500 text-white rounded-lg px-4 py-3 text-center font-medium shadow-lg">
            {notification}
          </div>
        </div>
      )}

      <header className="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 shadow-sm">
        <div>
          <h1 className="text-lg font-bold" style={{color: '#c0392b'}}>La Forno</h1>
          <p className="text-[11px] text-gray-400">Livrare</p>
        </div>
        <button onClick={fetchOrders} className="w-10 h-10 rounded-lg bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition-colors">
          <Icon name="refresh" size={18} className="text-gray-600"/>
        </button>
      </header>

      <div className="flex-1 overflow-y-auto pb-20">
        <div className="max-w-2xl mx-auto w-full p-4 space-y-4">
          {inPreparare.length > 0 && (
            <div className="space-y-3">
              <div className="flex items-center gap-2 px-2">
                <Icon name="clock" size={16} className="text-amber-500"/>
                <h2 className="font-bold text-gray-800">Se prepară ({inPreparare.length})</h2>
              </div>
              {inPreparare.map(order => (
                <div key={order.id} className="bg-white rounded-2xl border border-amber-200 shadow overflow-hidden">
                  <div className="bg-amber-50 px-4 py-3 border-b border-amber-100 flex items-center justify-between">
                    <div>
                      <p className="font-bold text-gray-800">{order.name}</p>
                      <p className="text-xs text-gray-500">{(order.items||[]).length} produse · {order.total} lei</p>
                    </div>
                    <span className="text-[11px] bg-amber-100 text-amber-700 font-semibold px-2.5 py-1 rounded-full">În preparare</span>
                  </div>
                  <div className="p-3 space-y-2">
                    <div className="flex items-center gap-2 text-xs text-gray-600">
                      <Icon name="mapPin" size={14} className="text-gray-400 flex-none"/>
                      <span className="truncate">{order.address}</span>
                    </div>
                    <a href={`tel:${order.phone}`} className="flex items-center gap-2 text-xs text-blue-600 font-medium">
                      <Icon name="phone" size={14}/>{order.phone}
                    </a>
                  </div>
                </div>
              ))}
            </div>
          )}

          {gataDeLopit.length > 0 && (
            <div className="space-y-3">
              <div className="flex items-center gap-2 px-2">
                <div className="w-2 h-2 rounded-full bg-red-500 pulse"/>
                <h2 className="font-bold text-gray-800">Gata de ridicat ({gataDeLopit.length})</h2>
              </div>
              {gataDeLopit.map(order => (
                <div key={order.id} className="card-new bg-white rounded-2xl border-2 border-red-200 shadow-lg overflow-hidden">
                  <div className="bg-gradient-to-r from-red-500 to-orange-500 px-4 py-3 text-white">
                    <p className="font-bold text-lg">{order.name}</p>
                    <p className="text-sm opacity-90">{(order.items || []).length} produse · {order.total} lei</p>
                  </div>

                  <div className="p-4 space-y-3">
                    <a href={`tel:${order.phone}`} className="flex items-center gap-3 p-3 bg-blue-50 rounded-xl hover:bg-blue-100 transition-colors">
                      <Icon name="phone" size={20} className="text-blue-600 flex-none"/>
                      <div className="min-w-0">
                        <p className="text-[11px] text-gray-500 uppercase font-medium">Telefon client</p>
                        <p className="text-sm font-bold text-blue-700">{order.phone}</p>
                      </div>
                    </a>

                    <a href={mapsUrl(order.address)} target="_blank" className="flex items-center gap-3 p-3 bg-green-50 rounded-xl hover:bg-green-100 transition-colors">
                      <Icon name="mapPin" size={20} className="text-green-600 flex-none"/>
                      <div className="min-w-0">
                        <p className="text-[11px] text-gray-500 uppercase font-medium">Adresă livrare</p>
                        <p className="text-sm font-bold text-green-700 truncate">{order.address}</p>
                      </div>
                    </a>

                    {order.notes && (
                      <div className="p-3 bg-amber-50 rounded-xl border border-amber-200">
                        <p className="text-[11px] text-gray-500 uppercase font-medium mb-1">Observații</p>
                        <p className="text-sm text-amber-800 italic">{order.notes}</p>
                      </div>
                    )}

                    <button onClick={() => updateStatus(order.id, 'în livrare')} disabled={updating === order.id}
                      className="w-full py-3.5 rounded-xl bg-gradient-to-r from-red-500 to-orange-500 text-white font-bold text-sm transition-all active:scale-95 disabled:opacity-60 flex items-center justify-center gap-2 shadow-md">
                      {updating === order.id ? (
                        <><div className="w-4 h-4 rounded-full border-2 border-white border-t-transparent animate-spin"/> Se trimite...</>
                      ) : (
                        <><Icon name="truck" size={16}/> Am ridicat comanda</>
                      )}
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}

          {inLivrare.length > 0 && (
            <div className="space-y-3">
              <div className="flex items-center gap-2 px-2 mt-6">
                <Icon name="clock" size={16} className="text-orange-600"/>
                <h2 className="font-bold text-gray-800">În livrare ({inLivrare.length})</h2>
              </div>
              {inLivrare.map(order => (
                <div key={order.id} className="bg-white rounded-2xl border border-gray-200 shadow overflow-hidden hover:shadow-lg transition-shadow">
                  <div className="bg-orange-50 px-4 py-3 border-b border-orange-200">
                    <p className="font-bold text-gray-800">{order.name}</p>
                    <p className="text-xs text-gray-500">{order.total} lei</p>
                  </div>

                  <div className="p-3 space-y-2">
                    <div className="flex items-center gap-2 text-xs text-gray-600">
                      <Icon name="mapPin" size={14} className="text-gray-400 flex-none"/>
                      <span className="truncate">{order.address}</span>
                    </div>
                    <button onClick={() => updateStatus(order.id, 'livrată')} disabled={updating === order.id}
                      className="w-full py-2.5 rounded-lg bg-green-500 text-white font-bold text-xs transition-all active:scale-95 disabled:opacity-60 flex items-center justify-center gap-2">
                      {updating === order.id ? (
                        <><div className="w-3 h-3 rounded-full border-2 border-white border-t-transparent animate-spin"/> Se salvează...</>
                      ) : (
                        <><Icon name="check" size={14}/> Livrată</>
                      )}
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}

          {inPreparare.length === 0 && gataDeLopit.length === 0 && inLivrare.length === 0 && (
            <div className="h-80 flex flex-col items-center justify-center text-center p-4">
              <Icon name="truck" size={48} className="text-gray-300 mb-3"/>
              <p className="text-gray-500 font-medium">Nici o comandă de livrat acum</p>
              <p className="text-xs text-gray-400 mt-1">Bifeaza din cand in cand pentru comenzi noi</p>
            </div>
          )}
        </div>
      </div>

      <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-4 py-3 flex gap-2 justify-center">
        <div className="text-center text-sm">
          <p className="font-bold text-gray-800">{inPreparare.length + gataDeLopit.length + inLivrare.length} comenzi active</p>
          <p className="text-xs text-gray-500">{inPreparare.length} se prepară · {gataDeLopit.length} gata · {inLivrare.length} în curs</p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
