// ---------- Cart Hook ----------
function useCart() {
  const [cart, setCart] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('laforno_cart') || '[]'); }
    catch { return []; }
  });
  React.useEffect(() => {
    localStorage.setItem('laforno_cart', JSON.stringify(cart));
  }, [cart]);

  const addToCart = React.useCallback((item) => {
    setCart(prev => {
      const found = prev.find(i => i.name === item.name);
      return found
        ? prev.map(i => i.name === item.name ? { ...i, qty: i.qty + 1 } : i)
        : [...prev, { name: item.name, price: item.price, img: item.img, qty: 1 }];
    });
  }, []);

  const updateQty = React.useCallback((name, qty) => {
    setCart(prev => qty < 1
      ? prev.filter(i => i.name !== name)
      : prev.map(i => i.name === name ? { ...i, qty } : i)
    );
  }, []);

  const removeFromCart = React.useCallback((name) => {
    setCart(prev => prev.filter(i => i.name !== name));
  }, []);

  const clearCart = React.useCallback(() => setCart([]), []);

  const cartCount = cart.reduce((s, i) => s + i.qty, 0);
  const cartTotal = cart.reduce((s, i) => s + i.price * i.qty, 0);

  return { cart, cartCount, cartTotal, addToCart, updateQty, removeFromCart, clearCart };
}

// ---------- Reveal ----------
function useReveal() {
  React.useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
}

  }, []);

  const [menuData, setMenuData] = React.useState(staticMenu);
  const [active, setActive] = React.useState(Object.keys(staticMenu)[0]);
  const getQty = (name) => (cart.find(i => i.name === name) || {}).qty || 0;

  React.useEffect(() => {
    db.from('menu_items')
      .select('*')
      .eq('available', true)
      .order('sort_order')
      .then(({ data, error }) => {
        if (!error && data?.length) {
          const grouped = {};
          data.forEach(item => {
            if (!grouped[item.category]) grouped[item.category] = [];
            grouped[item.category].push(item);
          });
          setMenuData(grouped);
          setActive(a => grouped[a] ? a : Object.keys(grouped)[0]);

  const cats = Object.keys(menuData);

  return (

// ---------- Checkout Modal ----------
function CheckoutModal({ cart, total, onClose, onSuccess }) {
  const [form, setForm] = React.useState({ name: '', phone: '', address: '', notes: '' });
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');
  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  React.useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);

  const submit = async (e) => {
    e.preventDefault();
    setLoading(true);
    setError('');
    try {
      const { error: err } = await db.from('orders').insert([{
        name: form.name,
        phone: form.phone,
        address: form.address,
        notes: form.notes,
        items: cart.map(i => ({ name: i.name, price: i.price, qty: i.qty })),
        total,
        status: 'nouă',
      }]);
      if (err) throw new Error(err.message);
      onSuccess();
    } catch (err) {
      setError(err.message || 'Eroare la plasarea comenzii. Încearcă din nou.');
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4" style={{ background: 'rgba(0,0,0,.6)' }}>
      <div className="bg-white rounded-2xl w-full max-w-md max-h-[90vh] overflow-y-auto shadow-2xl">
        <div className="flex items-center justify-between px-6 py-4 border-b sticky top-0 bg-white rounded-t-2xl" style={{ borderColor: 'var(--border)' }}>
          <h2 className="font-display text-xl" style={{ color: 'var(--text)' }}>Finalizare Comandă</h2>
          <button onClick={onClose} className="w-8 h-8 rounded-full flex items-center justify-center transition-colors hover:bg-gray-100" style={{ color: 'var(--muted)' }}>
            <XIcon size={16} />
          </button>
        </div>
        <div className="px-6 py-5">
          <div className="mb-6 rounded-xl p-4" style={{ background: 'var(--cream)' }}>
            <p className="text-[10px] tracking-[0.3em] uppercase font-medium mb-3" style={{ color: 'var(--muted)' }}>Sumar comandă</p>
            <div className="space-y-2">
              {cart.map(item => (
                <div key={item.name} className="flex justify-between text-[14px]">
                  <span style={{ color: 'var(--text)' }}>{item.name} <span style={{ color: 'var(--muted)' }}>×{item.qty}</span></span>
                  <span className="font-medium" style={{ color: 'var(--text)' }}>{item.price * item.qty} lei</span>
                </div>
              ))}
            </div>
            <div className="mt-3 pt-3 border-t flex justify-between" style={{ borderColor: 'var(--border)' }}>
              <span className="font-medium text-[14px]" style={{ color: 'var(--text)' }}>Total</span>
              <span className="font-display text-xl" style={{ color: 'var(--red)' }}>{total} lei</span>
            </div>
          </div>
          <form onSubmit={submit} className="space-y-5">
            <Field label="Nume complet"><input required type="text" value={form.name} onChange={set('name')} placeholder="Ion Popescu" className="w-full py-2.5 text-[15px] border-b focus:border-red-500 transition-colors bg-transparent" style={{ borderColor: 'var(--border)', color: 'var(--text)' }} /></Field>
            <Field label="Telefon"><input required type="tel" value={form.phone} onChange={set('phone')} placeholder="+373 69 000 000" className="w-full py-2.5 text-[15px] border-b focus:border-red-500 transition-colors bg-transparent" style={{ borderColor: 'var(--border)', color: 'var(--text)' }} /></Field>
            <Field label="Adresă de livrare"><textarea required rows="2" value={form.address} onChange={set('address')} placeholder="Strada, număr, apartament, oraș..." className="w-full py-2.5 text-[15px] border-b focus:border-red-500 transition-colors bg-transparent resize-none" style={{ borderColor: 'var(--border)', color: 'var(--text)' }} /></Field>
            <Field label="Observații (opțional)"><textarea rows="2" value={form.notes} onChange={set('notes')} placeholder="Alergii, preferințe..." className="w-full py-2.5 text-[15px] border-b focus:border-red-500 transition-colors bg-transparent resize-none" style={{ borderColor: 'var(--border)', color: 'var(--text)' }} /></Field>
            {error && <div className="px-4 py-3 rounded-xl text-[13px]" style={{ background: '#fef2f2', color: '#dc2626', border: '1px solid #fecaca' }}>{error}</div>}
            <button type="submit" disabled={loading} className="w-full py-3.5 rounded-full text-[13px] font-medium tracking-wide text-white flex items-center justify-center gap-2" style={{ background: 'var(--red)', opacity: loading ? 0.7 : 1 }}>
              {loading ? 'Se trimite...' : <><BagIcon size={15} /> Plasează comanda</>}
            </button>
          </form>
        </div>
      </div>
    </div>
  );
}

// ---------- Success Toast ----------
function SuccessToast({ onDismiss }) {
  React.useEffect(() => { const t = setTimeout(onDismiss, 5000); return () => clearTimeout(t); }, [onDismiss]);
  return (
    <div className="toast-in fixed bottom-6 right-6 z-[70] flex items-center gap-3 px-5 py-4 rounded-2xl shadow-2xl text-white" style={{ background: '#1a1a1a', maxWidth: 340 }}>
      <div className="w-9 h-9 rounded-full flex items-center justify-center flex-none" style={{ background: '#27ae60' }}>
        <CheckCircle size={18} />
      </div>
      <div>
        <p className="font-medium text-[14px]">Comanda a fost plasată!</p>
        <p className="text-[12px] text-white/70 mt-0.5">Vă vom contacta în scurt timp pentru confirmare.</p>
      </div>
      <button onClick={onDismiss} className="ml-2 flex-none opacity-60 hover:opacity-100"><XIcon size={14} /></button>
    </div>
  );
}

// ---------- App ----------
function App() {
  const { cart, cartCount, cartTotal, addToCart, updateQty, removeFromCart, clearCart } = useCart();
  const [cartOpen, setCartOpen] = React.useState(false);
  const [checkoutOpen, setCheckoutOpen] = React.useState(false);
  const [orderSuccess, setOrderSuccess] = React.useState(false);

  useReveal();

  const handleOrderSuccess = React.useCallback(() => {
    clearCart(); setCheckoutOpen(false); setOrderSuccess(true);
  }, [clearCart]);

  const handleCheckout = React.useCallback(() => {
    setCartOpen(false); setCheckoutOpen(true);
  }, []);

  return (
    <div>
      <Nav cartCount={cartCount} onCartOpen={() => setCartOpen(true)} />
      <main>
        <Hero />
        <MenuSection cart={cart} onAddToCart={addToCart} />
        <Gallery />
        <Reservation />
        <About />
        <Contact />
      </main>
      <Footer />
      <CartSidebar open={cartOpen} cart={cart} total={cartTotal} onClose={() => setCartOpen(false)} onUpdateQty={updateQty} onRemove={removeFromCart} onCheckout={handleCheckout} />
      {checkoutOpen && <CheckoutModal cart={cart} total={cartTotal} onClose={() => setCheckoutOpen(false)} onSuccess={handleOrderSuccess} />}
      {orderSuccess && <SuccessToast onDismiss={() => setOrderSuccess(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
