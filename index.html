// ---------- Reveal ----------
function useReveal() {
  React.useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
}

function Nav() {
  const [scrolled, setScrolled] = React.useState(false);

  React.useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 20);

    return () => window.removeEventListener('scroll', fn);
  }, []);

    <header className={`fixed top-0 inset-x-0 z-50 transition-all duration-300 ${scrolled ? 'bg-white/95 backdrop-blur shadow-sm' : 'bg-white/80 backdrop-blur'}`}

// ---------- Hero ----------

    return () => clearInterval(t);
  }, []);
  return (
    <section id="top" className="relative h-screen min-h-[560px] overflow-hidden">
      {slides.map((src, i) => (
        <div key={i} className="absolute inset-0 transition-opacity duration-1000"
          style={{ opacity: slide === i ? 1 : 0, backgroundImage: `url(${src})`, backgroundSize: 'cover', backgroundPosition: 'center' }} />
      ))}
      <div className="absolute inset-0" style={{ background: 'linear-gradient(to bottom, rgba(0,0,0,.35) 0%, rgba(0,0,0,.55) 60%, rgba(0,0,0,.7) 100%)' }} />

          {BRAND.tagline} · Chișinău

        <h1 className="hero-anim-2 font-display text-5xl sm:text-6xl md:text-8xl lg:text-9xl text-white font-medium leading-none mb-2">
          {BRAND.name}
        </h1>

          ))}

      </div>
    </section>
  );
}

// ---------- Reservation ----------
function Reservation() {
  const [form, setForm] = React.useState({ name: '', date: '', time: '19:30', guests: '2', phone: '', notes: '' });
  const [submitted, setSubmitted] = React.useState(false);
  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));
  const submit = e => { e.preventDefault(); setSubmitted(true); setTimeout(() => setSubmitted(false), 5000); };
  const today = new Date().toISOString().slice(0, 10);

  return (
    <section id="rezervare" className="py-16 md:py-32 px-5 md:px-8 bg-white">
      <div className="max-w-5xl mx-auto grid lg:grid-cols-2 gap-10 lg:gap-20 items-start">
        <div className="reveal">
          <p className="text-[11px] tracking-[0.45em] uppercase mb-3" style={{ color: 'var(--red)' }}>Rezervări</p>
          <h2 className="font-display text-4xl md:text-5xl leading-tight" style={{ color: 'var(--text)' }}>
            Rezervați<br /><em>masa voastră.</em>
          </h2>
          <p className="mt-5 text-[15px] leading-relaxed max-w-sm" style={{ color: 'var(--muted)' }}>
            Recomandam rezervarea cu cel puțin 24 de ore înainte, mai ales în weekend. Pentru grupuri de peste 8 persoane, sunați-ne direct.
          </p>
          <div className="mt-8 h-px w-12" style={{ background: 'var(--border)' }} />
          <ul className="mt-8 space-y-4">
            {[
              { Icon: ClockIcon, text: 'Mar–Joi 12:00–23:00 · Vin–Sâm 12:00–00:00 · Dum 12:00–22:00 · Luni închis' },
              { Icon: PhoneIcon, text: BRAND.phone },
              { Icon: MailIcon, text: BRAND.emailReservations },
            ].map(({ Icon, text }, i) => (
              <li key={i} className="flex items-start gap-3 text-[14px]" style={{ color: 'var(--muted)' }}>
                <Icon size={15} className="mt-0.5 flex-none" style={{ color: 'var(--red)' }} />
                {text}
              </li>
            ))}
          </ul>
        </div>

        <form onSubmit={submit} className="reveal bg-white rounded-2xl p-6 md:p-8 border" style={{ borderColor: 'var(--border)', boxShadow: '0 4px 40px rgba(0,0,0,.06)' }}>
          <h3 className="font-display text-2xl mb-6" style={{ color: 'var(--text)' }}>Formular Rezervare</h3>
          <div className="space-y-5">
            <Field label="Nume complet">
              <input required type="text" value={form.name} onChange={set('name')} placeholder="Ion Popescu" className="w-full py-2.5 text-[15px] border-b focus:border-red-500 transition-colors bg-transparent" style={{ borderColor: 'var(--border)', color: 'var(--text)' }} />
            </Field>

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
              <Field label="Data">
                <input required type="date" min={today} value={form.date} onChange={set('date')} className="w-full py-2.5 text-[15px] border-b focus:border-red-500 transition-colors bg-transparent" style={{ borderColor: 'var(--border)', color: 'var(--text)', colorScheme: 'light' }} />
              </Field>
              <Field label="Ora">
                <select value={form.time} onChange={set('time')} className="w-full py-2.5 text-[15px] border-b focus:border-red-500 transition-colors bg-transparent" style={{ borderColor: 'var(--border)', color: 'var(--text)' }}>
                  {['12:00','13:00','14:00','18:00','18:30','19:00','19:30','20:00','20:30','21:00','21:30'].map(t =>
                    <option key={t} value={t}>{t}</option>
                  )}
                </select>
              </Field>
            </div>

            <Field label="Număr persoane">
              <div className="flex flex-wrap gap-2 pt-3">
                {['1','2','3','4','5','6','7','8+'].map(n => (
                  <button type="button" key={n} onClick={() => setForm(f => ({ ...f, guests: n }))}
                    className={`w-10 h-10 rounded-full text-[13px] font-medium transition-all border ${form.guests === n ? 'text-white border-transparent' : ''}`}
                    style={form.guests === n ? { background: 'var(--red)', borderColor: 'var(--red)' } : { borderColor: 'var(--border)', color: 'var(--muted)' }}>
                    {n}
                  </button>
                ))}
              </div>
            </Field>

            <Field label="Telefon">
              <input required type="tel" value={form.phone} onChange={set('phone')} placeholder="+373 ..." className="w-full py-2.5 text-[15px] border-b focus:border-red-500 transition-colors bg-transparent" style={{ borderColor: 'var(--border)', color: 'var(--text)' }} />
            </Field>

            <Field label="Cerințe speciale (opțional)">
              <textarea rows="2" value={form.notes} onChange={set('notes')} placeholder="Aniversare, alergii, masă în exterior..." className="w-full py-2.5 text-[15px] border-b focus:border-red-500 transition-colors bg-transparent resize-none" style={{ borderColor: 'var(--border)', color: 'var(--text)' }} />
            </Field>

            <button type="submit" className="w-full py-3.5 rounded-full text-[13px] font-medium tracking-wide text-white transition-opacity hover:opacity-90 flex items-center justify-center gap-2"
              style={{ background: submitted ? '#27ae60' : 'var(--red)' }}>
              {submitted ? '✓ Rezervare trimisă!' : <><CalIcon size={15} /> Confirmă Rezervarea</>}
            </button>
            {submitted && <p className="text-center text-[12px] mt-2" style={{ color: 'var(--muted)' }}>Vă vom contacta în scurt timp pentru confirmare.</p>}
          </div>
        </form>
      </div>
    </section>
  );
}

function Field({ label, children }) {
  return (
    <label className="block">
      <span className="block text-[10px] tracking-[0.3em] uppercase mb-1.5 font-medium" style={{ color: 'var(--muted)' }}>{label}</span>
      {children}
    </label>
  );
}
