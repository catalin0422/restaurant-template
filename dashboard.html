// ── Comenzi ───────────────────────────────────────────────────────────────────
function Comenzi() {
  const [orders, setOrders] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [filter, setFilter] = React.useState('all');
  const [expanded, setExpanded] = React.useState(null);
  const [updating, setUpdating] = React.useState(null);

  const fetchOrders = React.useCallback(async () => {
    setLoading(true);
    const { data, error } = await db.from('orders').select('*').order('created_at', { ascending: false });
    if (!error) setOrders(data || []);
    setLoading(false);
  }, []);

  React.useEffect(() => {
    fetchOrders();

    // Real-time: se actualizează automat când vin comenzi noi
    const channel = db.channel('orders-realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, fetchOrders)
      .subscribe();

    return () => db.removeChannel(channel);
  }, [fetchOrders]);

  const updateStatus = async (id, status) => {
    setUpdating(id);
    const { data } = await db.from('orders').update({ status }).eq('id', id).select().single();
    if (data) setOrders(prev => prev.map(o => o.id === data.id ? data : o));
    setUpdating(null);
  };

  const filtered = filter === 'all' ? orders : orders.filter(o => o.status === filter);
  const totalVenit = orders.reduce((s, o) => s + (o.total || 0), 0);

  const statusFilters = [
    ['all',       'Toate',     orders.length],
    ['nouă',      'Noi',       orders.filter(o => o.status === 'nouă').length],
    ['în proces', 'În proces', orders.filter(o => o.status === 'în proces').length],
    ['livrată',   'Livrate',   orders.filter(o => o.status === 'livrată').length],
  ];

  if (loading) return (
    <div className="flex flex-col items-center justify-center py-24 gap-4">
      <div className="w-8 h-8 rounded-full border-2 border-purple-500 border-t-transparent spin"/>
      <p className="text-[14px] text-gray-400">Se încarcă comenzile din Supabase...</p>
    </div>
  );

  return (
    <div className="space-y-5">
      {/* Stats */}
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
        {[
          { label:'Total comenzi', value: orders.length,                                       color:'bg-purple-50 text-purple-500', icon:'bag'      },
          { label:'Comenzi noi',   value: orders.filter(o=>o.status==='nouă').length,           color:'bg-blue-50 text-blue-500',    icon:'bell'     },
          { label:'În livrare',    value: orders.filter(o=>o.status==='în proces').length,      color:'bg-amber-50 text-amber-500',  icon:'truck'    },
          { label:'Venit total',   value: `${totalVenit} lei`,                                  color:'bg-green-50 text-green-600',  icon:'euro'     },
        ].map(s => (
          <div key={s.label} className="bg-white rounded-2xl p-4 border border-gray-100 flex items-center gap-3">
            <span className={`w-9 h-9 rounded-xl flex items-center justify-center flex-none ${s.color}`}>
              <Icon name={s.icon} size={16}/>
            </span>
            <div>
              <p className="text-[11px] font-medium text-gray-400 uppercase tracking-wide">{s.label}</p>
              <p className="text-xl font-semibold text-gray-900">{s.value}</p>
            </div>
          </div>
        ))}
      </div>

      {/* Filtre */}
      <div className="bg-white rounded-2xl p-4 border border-gray-100 flex flex-wrap gap-2 items-center">
        {statusFilters.map(([v, l, count]) => (
          <button key={v} onClick={() => setFilter(v)}
            className={`px-3.5 py-2 rounded-full text-[12px] font-medium transition-all flex items-center gap-1.5 ${filter===v ? 'bg-red-600 text-white' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>
            {l}
            <span className={`text-[10px] px-1.5 py-0.5 rounded-full font-bold ${filter===v ? 'bg-white/20' : 'bg-white text-gray-500'}`}>{count}</span>
          </button>
        ))}
        <button onClick={fetchOrders} className="ml-auto flex items-center gap-1.5 px-3.5 py-2 rounded-full text-[12px] font-medium bg-gray-100 text-gray-500 hover:bg-gray-200 transition-colors">
          <Icon name="refresh" size={13}/> Actualizează
        </button>
      </div>

      {/* Lista */}
      {filtered.length === 0 ? (
        <div className="bg-white rounded-2xl border border-gray-100 py-16 flex flex-col items-center gap-3">
          <Icon name="bag" size={36} className="text-gray-200"/>
          <p className="text-[14px] text-gray-400">Nicio comandă{filter !== 'all' ? ` cu status "${filter}"` : ''}.</p>
        </div>
      ) : (
        <div className="space-y-3">
          {filtered.map(order => (
            <div key={order.id} className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
              {/* Header comandă */}
              <div className="flex items-center justify-between px-5 py-4 cursor-pointer hover:bg-gray-50/50 transition-colors"
                onClick={() => setExpanded(expanded === order.id ? null : order.id)}>
                <div className="flex items-center gap-3">
                  <div className="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-[12px] font-semibold text-gray-500 flex-none">
                    {(order.name || '?').split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase()}
                  </div>
                  <div>
                    <div className="flex items-center gap-2 flex-wrap">
                      <p className="text-[14px] font-semibold text-gray-900">{order.name}</p>
                      <OrdBadge status={order.status}/>
                    </div>
                    <p className="text-[12px] text-gray-400 mt-0.5">
                      {formatDate(order.created_at)} · {(order.items||[]).length} produse · <span className="font-medium text-gray-600">{order.total} lei</span>
                    </p>
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  {/* Butoane status — desktop */}
                  <div className="hidden sm:flex gap-1" onClick={e => e.stopPropagation()}>
                    {order.status === 'nouă' && (
                      <button onClick={() => updateStatus(order.id, 'în proces')} disabled={updating === order.id}
                        className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-amber-50 text-amber-700 text-[11px] font-medium hover:bg-amber-100 transition-colors disabled:opacity-50">
                        <Icon name="clock" size={12}/> În proces
                      </button>
                    )}
                    {order.status === 'în proces' && (
                      <button onClick={() => updateStatus(order.id, 'livrată')} disabled={updating === order.id}
                        className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-green-50 text-green-700 text-[11px] font-medium hover:bg-green-100 transition-colors disabled:opacity-50">
                        <Icon name="check" size={12}/> Livrată
                      </button>
                    )}
                    {order.status === 'livrată' && (
                      <span className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-green-50 text-green-700 text-[11px] font-medium">
                        <Icon name="check" size={12}/> Finalizată
                      </span>
                    )}
                  </div>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                    className={`text-gray-300 transition-transform ${expanded === order.id ? 'rotate-180' : ''}`}>
                    <polyline points="6 9 12 15 18 9"/>
                  </svg>
                </div>
              </div>

              {/* Detalii expandate */}
              {expanded === order.id && (
                <div className="border-t border-gray-100 px-5 py-4 space-y-4">
                  <div className="grid sm:grid-cols-3 gap-4">
                    <div className="flex items-start gap-2">
                      <Icon name="phone" size={13} className="text-gray-300 mt-0.5 flex-none"/>
                      <div>
                        <p className="text-[10px] font-medium text-gray-400 uppercase tracking-wide mb-0.5">Telefon</p>
                        <p className="text-[13px] text-gray-800">{order.phone}</p>
                      </div>
                    </div>
                    <div className="flex items-start gap-2 sm:col-span-2">
                      <Icon name="mapPin" size={13} className="text-gray-300 mt-0.5 flex-none"/>
                      <div>
                        <p className="text-[10px] font-medium text-gray-400 uppercase tracking-wide mb-0.5">Adresă livrare</p>
                        <p className="text-[13px] text-gray-800">{order.address}</p>
                      </div>
                    </div>
                    {order.notes && (
                      <div className="flex items-start gap-2 sm:col-span-3">
                        <Icon name="edit" size={13} className="text-gray-300 mt-0.5 flex-none"/>
                        <div>
                          <p className="text-[10px] font-medium text-gray-400 uppercase tracking-wide mb-0.5">Observații</p>
                          <p className="text-[13px] text-gray-600 italic">{order.notes}</p>
                        </div>
                      </div>
                    )}
                  </div>

                  {/* Produse */}
                  <div className="rounded-xl overflow-hidden border border-gray-100">
                    <div className="px-4 py-2.5 bg-gray-50 border-b border-gray-100">
                      <p className="text-[11px] font-semibold text-gray-400 uppercase tracking-wide">Produse comandate</p>
                    </div>
                    {(order.items || []).map((item, i) => (
                      <div key={i} className="flex items-center justify-between px-4 py-2.5 border-b border-gray-50 last:border-0">
                        <span className="text-[13px] text-gray-700">{item.name} <span className="text-gray-400">×{item.qty}</span></span>
                        <span className="text-[13px] font-medium text-gray-800">{item.price * item.qty} lei</span>
                      </div>
                    ))}
                    <div className="flex items-center justify-between px-4 py-3 bg-gray-50 border-t border-gray-100">
                      <span className="text-[13px] font-semibold text-gray-700">Total</span>
                      <span className="text-[15px] font-bold text-red-600">{order.total} lei</span>
                    </div>
                  </div>

                  {/* Butoane status — mobile */}
                  <div className="sm:hidden flex gap-2" onClick={e => e.stopPropagation()}>
                    {order.status === 'nouă' && (
                      <button onClick={() => updateStatus(order.id, 'în proces')} disabled={updating === order.id}
                        className="flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded-xl bg-amber-50 text-amber-700 text-[12px] font-medium hover:bg-amber-100 transition-colors disabled:opacity-50">
                        <Icon name="clock" size={14}/> Marchează „În proces"
                      </button>
                    )}
                    {order.status === 'în proces' && (
                      <button onClick={() => updateStatus(order.id, 'livrată')} disabled={updating === order.id}
                        className="flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded-xl bg-green-50 text-green-700 text-[12px] font-medium hover:bg-green-100 transition-colors disabled:opacity-50">
                        <Icon name="check" size={14}/> Marchează „Livrată"
                      </button>
                    )}
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Rezervări ─────────────────────────────────────────────────────────────────
function Rezervari() {
  const [filter, setFilter] = React.useState('all');
  const [statuses, setStatuses] = React.useState(() => Object.fromEntries(RESERVATIONS.map(r => [r.id, r.status])));
  const filtered = RESERVATIONS.filter(r => filter === 'all' || statuses[r.id] === filter);
  const confirm = id => setStatuses(s => ({ ...s, [id]: 'confirmed' }));
  const cancel  = id => setStatuses(s => ({ ...s, [id]: 'cancelled' }));

  return (
    <div className="space-y-5">
      <div className="bg-white rounded-2xl p-4 border border-gray-100 flex flex-wrap gap-2 items-center">
        {[['all','Toate'],['confirmed','Confirmate'],['pending','În așteptare'],['cancelled','Anulate']].map(([v,l]) => (
          <button key={v} onClick={() => setFilter(v)}
            className={`px-4 py-2 rounded-full text-[12px] font-medium transition-all ${filter===v ? 'bg-red-600 text-white' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>
            {l}
          </button>
        ))}
        <div className="ml-auto text-[12px] text-gray-400 font-medium">{filtered.length} rezervări</div>
      </div>
      <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
        <div className="hidden md:grid grid-cols-[2fr_1fr_1fr_1fr_auto] gap-4 px-5 py-3 border-b border-gray-100 text-[11px] font-semibold text-gray-400 uppercase tracking-wide">
          <span>Client</span><span>Data & Ora</span><span>Persoane</span><span>Status</span><span>Acțiuni</span>
        </div>
        <div className="divide-y divide-gray-50">
          {filtered.map(r => (
            <div key={r.id} className="px-5 py-4 hover:bg-gray-50/50 transition-colors">
              <div className="md:hidden flex items-start justify-between gap-3">
                <div>
                  <p className="text-[14px] font-semibold text-gray-900">{r.name}</p>
                  <p className="text-[12px] text-gray-400 mt-0.5">{r.date} · {r.time} · {r.guests} pers.</p>
                  {r.notes && <p className="text-[11px] text-gray-400 mt-0.5 italic">{r.notes}</p>}
                  <div className="mt-2 flex gap-2">
                    <ResBadge status={statuses[r.id]}/>
                    {statuses[r.id]==='pending' && (
                      <><button onClick={()=>confirm(r.id)} className="text-[11px] font-medium text-green-600">✓ Confirmă</button>
                      <button onClick={()=>cancel(r.id)} className="text-[11px] font-medium text-red-500">✕ Anulează</button></>
                    )}
                  </div>
                </div>
              </div>
              <div className="hidden md:grid grid-cols-[2fr_1fr_1fr_1fr_auto] gap-4 items-center">
                <div>
                  <p className="text-[14px] font-medium text-gray-900">{r.name}</p>
                  <p className="text-[12px] text-gray-400">{r.phone}{r.notes ? ` · ${r.notes}` : ''}</p>
                </div>
                <div>
                  <p className="text-[14px] text-gray-700">{r.date}</p>
                  <p className="text-[12px] text-gray-400">{r.time}</p>
                </div>
                <div className="flex items-center gap-1.5">
                  <Icon name="users" size={13} className="text-gray-300"/>
                  <span className="text-[14px] text-gray-700">{r.guests} persoane</span>
                </div>
                <ResBadge status={statuses[r.id]}/>
                <div className="flex items-center gap-1">
                  {statuses[r.id]==='pending' && (
                    <>
                      <button onClick={()=>confirm(r.id)} className="w-8 h-8 rounded-lg bg-green-50 text-green-600 flex items-center justify-center hover:bg-green-100 transition-colors"><Icon name="check" size={14}/></button>
                      <button onClick={()=>cancel(r.id)}  className="w-8 h-8 rounded-lg bg-red-50 text-red-500 flex items-center justify-center hover:bg-red-100 transition-colors"><Icon name="x" size={14}/></button>
                    </>
                  )}
                  <button className="w-8 h-8 rounded-lg bg-gray-50 text-gray-400 flex items-center justify-center hover:bg-gray-100 transition-colors"><Icon name="phone" size={13}/></button>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Meniu ─────────────────────────────────────────────────────────────────────
function Meniu() {
  const [items, setItems] = React.useState(MENU_ITEMS);
  const toggle = name => setItems(is => is.map(i => i.name === name ? { ...i, available: !i.available } : i));
  const cats = [...new Set(items.map(i => i.cat))];
  return (
    <div className="space-y-5">
      {cats.map(cat => (
        <div key={cat} className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
          <div className="px-5 py-3.5 border-b border-gray-100 flex items-center justify-between">
            <p className="font-semibold text-gray-900">{cat}</p>
            <span className="text-[12px] text-gray-400">{items.filter(i=>i.cat===cat).length} preparate</span>
          </div>
          <div className="divide-y divide-gray-50">
            {items.filter(i => i.cat === cat).map(item => (
              <div key={item.name} className="flex items-center justify-between px-5 py-3.5 hover:bg-gray-50/50 transition-colors">
                <div className="flex items-center gap-3">
                  <div className={`w-2 h-2 rounded-full ${item.available ? 'bg-green-400' : 'bg-gray-300'}`}/>
                  <div>
                    <p className={`text-[14px] font-medium ${item.available ? 'text-gray-900' : 'text-gray-400 line-through'}`}>{item.name}</p>
                    <p className="text-[12px] text-gray-400">{item.price} lei</p>
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  {!item.available && <span className="text-[11px] bg-red-50 text-red-500 px-2 py-0.5 rounded-full font-medium">Epuizat</span>}
                  <button onClick={() => toggle(item.name)} className={`relative w-10 h-5 rounded-full transition-colors ${item.available ? 'bg-green-400' : 'bg-gray-200'}`}>
                    <span className={`absolute top-0.5 w-4 h-4 bg-white rounded-full shadow-sm transition-all ${item.available ? 'left-5' : 'left-0.5'}`}/>
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Setări ────────────────────────────────────────────────────────────────────
function Setari() {
  return (
    <div className="space-y-5 max-w-xl">
      {[
        { label:'Restaurant', fields:[
          {l:'Nume restaurant', v:'La Forno'},
          {l:'Telefon', v:'+373 22 456 789'},
          {l:'Email', v:'contact@laforno.md'},
          {l:'Adresă', v:'Strada Ștefan cel Mare 75, Chișinău'},
        ]},
        { label:'Program', fields:[
          {l:'Marți – Joi', v:'12:00 – 23:00'},
          {l:'Vineri – Sâmbătă', v:'12:00 – 00:00'},
          {l:'Duminică', v:'12:00 – 22:00'},
          {l:'Luni', v:'Închis'},
        ]},
      ].map(section => (
        <div key={section.label} className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
          <div className="px-5 py-3.5 border-b border-gray-100">
            <p className="font-semibold text-gray-900">{section.label}</p>
          </div>
          <div className="p-5 space-y-4">
            {section.fields.map(f => (
              <div key={f.l}>
                <label className="block text-[11px] font-medium text-gray-400 uppercase tracking-wide mb-1.5">{f.l}</label>
                <input defaultValue={f.v} className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-[14px] text-gray-800 focus:outline-none focus:border-red-400 transition-colors bg-gray-50"/>
              </div>
            ))}
          </div>
        </div>
      ))}
      <button className="px-6 py-2.5 rounded-xl bg-red-600 text-white text-[13px] font-medium hover:bg-red-700 transition-colors">Salvează modificările</button>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = React.useState('overview');
  const [sideOpen, setSideOpen] = React.useState(false);
  const [orders, setOrders] = React.useState([]);

  const pendingRes = RESERVATIONS.filter(r => r.status === 'pending').length;
  const newOrders  = orders.filter(o => o.status === 'nouă').length;

  // Încarcă comenzile pentru badge și overview
  React.useEffect(() => {
    db.from('orders').select('*').order('created_at', { ascending: false })
      .then(({ data }) => setOrders(data || []));

    const channel = db.channel('app-orders')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, () => {
        db.from('orders').select('*').order('created_at', { ascending: false })
          .then(({ data }) => setOrders(data || []));
      })
      .subscribe();

    return () => db.removeChannel(channel);
  }, []);

  const titles = { overview:'Bună ziua! 👋', comenzi:'Comenzi Online', rezervari:'Rezervări', meniu:'Gestionare Meniu', setari:'Setări' };
  const subs   = { overview:'Ce se întâmplă azi la La Forno.', comenzi:'Comenzi primite prin site — actualizare în timp real.', rezervari:'Gestionați și confirmați rezervările.', meniu:'Activați sau dezactivați preparate.', setari:'Configurați restaurantul.' };

  const Sidebar = ({ mobile = false }) => (
    <aside className={`${mobile ? 'w-64' : 'hidden lg:flex w-56 xl:w-60'} flex-col bg-white border-r border-gray-100 min-h-screen sticky top-0 h-screen`}>
      <div className="p-5 border-b border-gray-100">
        <span className="text-xl font-medium" style={{ color:'#c0392b', fontFamily:"'Playfair Display',serif" }}>La Forno</span>
        <p className="text-[11px] text-gray-400 mt-0.5">Panou de administrare</p>
      </div>
      <nav className="flex-1 p-3 space-y-0.5">
        {NAV.map(n => (
          <button key={n.key} onClick={() => { setPage(n.key); setSideOpen(false); }}
            className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-[13px] font-medium transition-all ${page===n.key ? 'bg-red-50 text-red-600' : 'text-gray-500 hover:bg-gray-50 hover:text-gray-800'}`}>
            <Icon name={n.icon} size={16}/>
            {n.label}
            {n.key === 'comenzi'   && newOrders  > 0 && <span className="ml-auto text-[10px] bg-purple-500 text-white rounded-full min-w-[16px] h-4 px-1 flex items-center justify-center font-semibold">{newOrders}</span>}
            {n.key === 'rezervari' && pendingRes > 0 && <span className="ml-auto text-[10px] bg-red-500 text-white rounded-full w-4 h-4 flex items-center justify-center font-semibold">{pendingRes}</span>}
          </button>
        ))}
      </nav>
      <div className="p-3 border-t border-gray-100">
        <div className="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-gray-50 cursor-pointer">
          <div className="w-7 h-7 rounded-full bg-red-100 flex items-center justify-center text-[11px] font-bold text-red-600">DC</div>
          <div className="flex-1 min-w-0">
            <p className="text-[13px] font-medium text-gray-800 truncate">Dogaru Catalin</p>
            <p className="text-[11px] text-gray-400">Administrator</p>
          </div>
          <Icon name="logout" size={14} className="text-gray-300"/>
        </div>
      </div>
    </aside>
  );

  const pages = {
    overview:  <Overview setPage={setPage} orders={orders}/>,
    comenzi:   <Comenzi/>,
    rezervari: <Rezervari/>,
    meniu:     <Meniu/>,
    setari:    <Setari/>,
  };

  return (
    <div className="flex min-h-screen">
      <Sidebar/>
      {sideOpen && (
        <div className="lg:hidden fixed inset-0 z-50 flex">
          <div className="fixed inset-0 bg-black/40" onClick={() => setSideOpen(false)}/>
          <div className="relative z-10"><Sidebar mobile/></div>
        </div>
      )}
      <div className="flex-1 flex flex-col min-w-0">
        <header className="bg-white border-b border-gray-100 px-5 md:px-8 h-14 flex items-center justify-between sticky top-0 z-30">
          <div className="flex items-center gap-3">
            <button onClick={() => setSideOpen(true)} className="lg:hidden p-1.5 rounded-lg hover:bg-gray-100">
              <Icon name="menu" size={18} className="text-gray-600"/>
            </button>
            <p className="text-[14px] font-semibold text-gray-800 hidden sm:block">{titles[page]}</p>
          </div>
          <div className="flex items-center gap-2">
            <a href="index.html" target="_blank" className="hidden sm:flex items-center gap-1.5 px-3.5 py-2 rounded-xl text-[12px] font-medium bg-red-50 text-red-600 hover:bg-red-100 transition-colors">
              <Icon name="edit" size={13}/> Vezi site
            </a>
            <button className="relative w-9 h-9 rounded-xl hover:bg-gray-100 flex items-center justify-center transition-colors">
              <Icon name="bell" size={17} className="text-gray-500"/>
              {(newOrders > 0 || pendingRes > 0) && <span className="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-red-500"/>}
            </button>
            <div className="w-8 h-8 rounded-full bg-red-100 flex items-center justify-center text-[11px] font-bold text-red-600">DC</div>
          </div>
        </header>
        <main className="flex-1 p-5 md:p-8 overflow-auto">
          <div className="mb-6 hidden sm:block">
            <h1 className="text-xl font-semibold text-gray-900">{titles[page]}</h1>
            <p className="text-[13px] text-gray-400 mt-0.5">{subs[page]}</p>
          </div>
          {pages[page]}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
