// ── Helpers ───────────────────────────────────────────────────────────────────
const STATUS = {
  confirmed: { label:'Confirmată', bg:'bg-green-50',  text:'text-green-700',  dot:'bg-green-500' },
  pending:   { label:'În așteptare', bg:'bg-amber-50', text:'text-amber-700',  dot:'bg-amber-400' },

const Badge = ({status}) => {

    <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-medium ${s.bg} ${s.text}`}>

// ── Stat Card ─────────────────────────────────────────────────────────────────
const StatCard = ({label, value, sub, icon, color}) => (
  <div className="bg-white rounded-2xl p-5 border border-gray-100 flex items-start justify-between">

      <Icon name={icon} size={18}/>

);

// ── Mini Bar Chart ────────────────────────────────────────────────────────────
const BarChart = () => {
  const data = [
    {day:'L', v:0},  {day:'M', v:18}, {day:'Mi', v:24}, {day:'J', v:20},
    {day:'V', v:38}, {day:'S', v:42}, {day:'D', v:30},
  ];
  const max = Math.max(...data.map(d=>d.v));
  return (
    <div className="bg-white rounded-2xl p-5 border border-gray-100">
      <div className="flex items-center justify-between mb-4">
        <div>
          <p className="text-[12px] font-medium text-gray-400 tracking-wide uppercase">Rezervări săptămâna aceasta</p>
          <p className="mt-1 text-2xl font-semibold text-gray-900">172 <span className="text-[13px] font-normal text-green-500">↑ 12%</span></p>
        </div>
        <Icon name="trending" size={18} className="text-gray-300"/>
      </div>
      <div className="flex items-end gap-2 h-20">
        {data.map(d => (
          <div key={d.day} className="flex-1 flex flex-col items-center gap-1">
            <div className="w-full rounded-t-md transition-all" style={{ height: d.v ? `${(d.v/max)*72}px` : '4px', background: d.day==='S'||d.day==='V' ? '#c0392b' : '#f0ebe4' }}/>
            <span className="text-[10px] text-gray-400 font-medium">{d.day}</span>
          </div>
        ))}
      </div>
    </div>
  );
};

// ── Rezervări Page ────────────────────────────────────────────────────────────
const Rezervari = () => {
  const [filter, setFilter] = React.useState('all');
  const [selected, setSelected] = React.useState(null);
  const [statuses, setStatuses] = React.useState(() => Object.fromEntries(RESERVATIONS.map(r=>[r.id, r.status])));

  const dates = [...new Set(RESERVATIONS.map(r=>r.date))].sort();
  const filtered = RESERVATIONS.filter(r => filter==='all' || statuses[r.id]===filter);

  const confirm = id => setStatuses(s=>({...s,[id]:'confirmed'}));
  const cancel  = id => setStatuses(s=>({...s,[id]:'cancelled'}));

  return (
    <div className="space-y-5">
      {/* Filters */}
      <div className="bg-white rounded-2xl p-4 border border-gray-100 flex flex-wrap gap-2 items-center">
        {[['all','Toate'], ['confirmed','Confirmate'], ['pending','În așteptare'], ['cancelled','Anulate']].map(([v,l]) => (
          <button key={v} onClick={()=>setFilter(v)}
            className={`px-4 py-2 rounded-full text-[12px] font-medium transition-all ${filter===v ? 'bg-red-600 text-white' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>
            {l}
          </button>
        ))}
        <div className="ml-auto text-[12px] text-gray-400 font-medium">{filtered.length} rezervări</div>
      </div>

      {/* Table */}
      <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
        {/* Header */}
        <div className="hidden md:grid grid-cols-[2fr_1fr_1fr_1fr_auto] gap-4 px-5 py-3 border-b border-gray-100 text-[11px] font-semibold text-gray-400 uppercase tracking-wide">
          <span>Client</span><span>Data & Ora</span><span>Persoane</span><span>Status</span><span>Acțiuni</span>
        </div>

        <div className="divide-y divide-gray-50">
          {filtered.map(r => (
            <div key={r.id} className="px-5 py-4 hover:bg-gray-50/50 transition-colors">
              {/* Mobile */}
              <div className="md:hidden flex items-start justify-between gap-3">
                <div>
                  <p className="text-[14px] font-semibold text-gray-900">{r.name}</p>
                  <p className="text-[12px] text-gray-400 mt-0.5">{r.date} · {r.time} · {r.guests} pers.</p>
                  {r.notes && <p className="text-[11px] text-gray-400 mt-0.5 italic">{r.notes}</p>}
                  <div className="mt-2 flex gap-2">
                    <Badge status={statuses[r.id]}/>
                    {statuses[r.id]==='pending' && (
                      <>
                        <button onClick={()=>confirm(r.id)} className="text-[11px] font-medium text-green-600 hover:text-green-700">✓ Confirmă</button>
                        <button onClick={()=>cancel(r.id)}  className="text-[11px] font-medium text-red-500 hover:text-red-600">✕ Anulează</button>
                      </>
                    )}
                  </div>
                </div>
              </div>
              {/* Desktop */}
              <div className="hidden md:grid grid-cols-[2fr_1fr_1fr_1fr_auto] gap-4 items-center">
                <div>
                  <p className="text-[14px] font-medium text-gray-900">{r.name}</p>
                  <p className="text-[12px] text-gray-400">{r.phone}{r.notes ? ` · ${r.notes}` : ''}</p>
                </div>
                <div>
                  <p className="text-[14px] text-gray-700">{r.date}</p>
                  <p className="text-[12px] text-gray-400">{r.time}</p>
                </div>
                <div className="flex items-center gap-1.5">
                  <Icon name="users" size={13} className="text-gray-300"/>
                  <span className="text-[14px] text-gray-700">{r.guests} persoane</span>
                </div>
                <Badge status={statuses[r.id]}/>
                <div className="flex items-center gap-1">
                  {statuses[r.id]==='pending' && (
                    <>
                      <button onClick={()=>confirm(r.id)} className="w-8 h-8 rounded-lg bg-green-50 text-green-600 flex items-center justify-center hover:bg-green-100 transition-colors" title="Confirmă">
                        <Icon name="check" size={14}/>
                      </button>
                      <button onClick={()=>cancel(r.id)} className="w-8 h-8 rounded-lg bg-red-50 text-red-500 flex items-center justify-center hover:bg-red-100 transition-colors" title="Anulează">
                        <Icon name="x" size={14}/>
                      </button>
                    </>
                  )}
                  <button className="w-8 h-8 rounded-lg bg-gray-50 text-gray-400 flex items-center justify-center hover:bg-gray-100 transition-colors" title="Sună">
                    <Icon name="phone" size={13}/>
                  </button>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ── Meniu Page ────────────────────────────────────────────────────────────────
const Meniu = () => {
  const [items, setItems] = React.useState(MENU_ITEMS);
  const toggle = name => setItems(is => is.map(i => i.name===name ? {...i, available:!i.available} : i));
  const cats = [...new Set(items.map(i=>i.cat))];

  return (
    <div className="space-y-5">
      {cats.map(cat => (
        <div key={cat} className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
          <div className="px-5 py-3.5 border-b border-gray-100 flex items-center justify-between">
            <p className="font-semibold text-gray-900">{cat}</p>
            <span className="text-[12px] text-gray-400">{items.filter(i=>i.cat===cat).length} preparate</span>
          </div>
          <div className="divide-y divide-gray-50">
            {items.filter(i=>i.cat===cat).map(item => (
              <div key={item.name} className="flex items-center justify-between px-5 py-3.5 hover:bg-gray-50/50 transition-colors">
                <div className="flex items-center gap-3">
                  <div className={`w-2 h-2 rounded-full ${item.available ? 'bg-green-400' : 'bg-gray-300'}`}/>
                  <div>
                    <p className={`text-[14px] font-medium ${item.available ? 'text-gray-900' : 'text-gray-400 line-through'}`}>{item.name}</p>
                    <p className="text-[12px] text-gray-400">{item.price} lei</p>
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  {!item.available && <span className="text-[11px] bg-red-50 text-red-500 px-2 py-0.5 rounded-full font-medium">Epuizat</span>}
                  <button onClick={()=>toggle(item.name)}
                    className={`relative w-10 h-5 rounded-full transition-colors ${item.available ? 'bg-green-400' : 'bg-gray-200'}`}>
                    <span className={`absolute top-0.5 w-4 h-4 bg-white rounded-full shadow-sm transition-all ${item.available ? 'left-5' : 'left-0.5'}`}/>
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
};

          {section.fields.map(f => (
            <div key={f.l}>
              <label className="block text-[11px] font-medium text-gray-400 uppercase tracking-wide mb-1.5">{f.l}</label>
              <input defaultValue={f.v} className="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-[14px] text-gray-800 focus:outline-none focus:border-red-400 transition-colors bg-gray-50"/>
            </div>
          ))}
        </div>
      </div>
    ))}
    <button className="px-6 py-2.5 rounded-xl bg-red-600 text-white text-[13px] font-medium hover:bg-red-700 transition-colors">
      Salvează modificările
    </button>
  </div>
);

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = React.useState('overview');
  const [sideOpen, setSideOpen] = React.useState(false);
  const pending = RESERVATIONS.filter(r=>r.status==='pending').length;

  const pages = { overview:<Overview setPage={setPage}/>, rezervari:<Rezervari/>, meniu:<Meniu/>, setari:<Setari/> };
  const titles = { overview:'Bună ziua! 👋', rezervari:'Rezervări', meniu:'Gestionare Meniu', setari:'Setări' };
  const subs   = { overview:'Iată ce se întâmplă azi la La Forno.', rezervari:'Gestionați și confirmați rezervările.', meniu:'Activați sau dezactivați preparate.', setari:'Configurați restaurantul.' };

  const Sidebar = ({mobile=false}) => (
    <aside className={`${mobile ? 'w-64' : 'hidden lg:flex w-56 xl:w-60'} flex-col bg-white border-r border-gray-100 min-h-screen sticky top-0 h-screen`}>
      <div className="p-5 border-b border-gray-100">
        <span className="font-display text-xl font-medium" style={{color:'#c0392b'}}>La Forno</span>
        <p className="text-[11px] text-gray-400 mt-0.5">Panou de administrare</p>
      </div>
      <nav className="flex-1 p-3 space-y-0.5">
        {NAV.map(n => (
          <button key={n.key} onClick={()=>{setPage(n.key); setSideOpen(false);}}
            className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-[13px] font-medium transition-all ${page===n.key ? 'bg-red-50 text-red-600' : 'text-gray-500 hover:bg-gray-50 hover:text-gray-800'}`}>
            <Icon name={n.icon} size={16}/>
            {n.label}
            {n.key==='rezervari' && pending>0 && (
              <span className="ml-auto text-[10px] bg-red-500 text-white rounded-full w-4 h-4 flex items-center justify-center font-semibold">{pending}</span>
            )}
          </button>
        ))}
      </nav>
      <div className="p-3 border-t border-gray-100">
        <div className="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-gray-50 cursor-pointer">
          <div className="w-7 h-7 rounded-full bg-red-100 flex items-center justify-center text-[11px] font-bold text-red-600">DC</div>
          <div className="flex-1 min-w-0">
            <p className="text-[13px] font-medium text-gray-800 truncate">Dogaru Catalin</p>
            <p className="text-[11px] text-gray-400">Administrator</p>
          </div>
          <Icon name="logout" size={14} className="text-gray-300"/>
        </div>
      </div>
    </aside>
  );

  return (
    <div className="flex min-h-screen">
      {/* Desktop sidebar */}
      <Sidebar/>

      {/* Mobile sidebar overlay */}
      {sideOpen && (
        <div className="lg:hidden fixed inset-0 z-50 flex">
          <div className="fixed inset-0 bg-black/40" onClick={()=>setSideOpen(false)}/>
          <div className="relative z-10">
            <Sidebar mobile/>
          </div>
        </div>
      )}

      {/* Main content */}
      <div className="flex-1 flex flex-col min-w-0">
        {/* Top bar */}
        <header className="bg-white border-b border-gray-100 px-5 md:px-8 h-14 flex items-center justify-between sticky top-0 z-30">
          <div className="flex items-center gap-3">
            <button onClick={()=>setSideOpen(true)} className="lg:hidden p-1.5 rounded-lg hover:bg-gray-100">
              <Icon name="menu" size={18} className="text-gray-600"/>
            </button>
            <p className="text-[14px] font-semibold text-gray-800 hidden sm:block">{titles[page]}</p>
          </div>
          <div className="flex items-center gap-2">
            <button className="relative w-9 h-9 rounded-xl hover:bg-gray-100 flex items-center justify-center transition-colors">
              <Icon name="bell" size={17} className="text-gray-500"/>
              {pending>0 && <span className="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-red-500"/>}
            </button>
            <div className="w-8 h-8 rounded-full bg-red-100 flex items-center justify-center text-[11px] font-bold text-red-600">DC</div>
          </div>
        </header>

        {/* Page */}
        <main className="flex-1 p-5 md:p-8 overflow-auto">
          <div className="mb-6 hidden sm:block">
            <h1 className="text-xl font-semibold text-gray-900">{titles[page]}</h1>
            <p className="text-[13px] text-gray-400 mt-0.5">{subs[page]}</p>
          </div>
          {pages[page]}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
